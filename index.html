function normalizeKey(value) {
  return asText(value)
    .toLowerCase()
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g, "")
    .replace(/[^a-z0-9]/g, "");
}

function asText(value) {
  if (value === null || value === undefined) return "";
  if (Array.isArray(value)) return listValues(value).map(asText).filter(Boolean).join(", ");
  if (value instanceof Date) return value.toISOString();
  return String(value);
}

function listValues(value) {
  if (!Array.isArray(value)) return value === null || value === undefined || value === "" ? [] : [value];
  return value[0] === "L" ? value.slice(1) : value;
}

function tableRows(data) {
  if (!data) return [];
  if (Array.isArray(data)) return data;
  if (Array.isArray(data.id)) {
    return data.id.map((id, index) => {
      const row = { id };
      Object.keys(data).forEach((key) => { row[key] = data[key][index]; });
      return row;
    });
  }
  return [];
}

function dateToISO(value) {
  if (!value) return "";
  if (value instanceof Date) return value.toISOString().slice(0, 10);
  if (typeof value === "number" && Number.isFinite(value)) {
    const ms = value > 100000000000 ? value : value * 1000;
    const parsed = new Date(ms);
    return Number.isNaN(parsed.getTime()) ? "" : parsed.toISOString().slice(0, 10);
  }
  const text = String(value).trim();
  const iso = text.match(/\d{4}-\d{2}-\d{2}/);
  if (iso) return iso[0];
  const french = text.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
  if (french) return `${french[3]}-${french[2].padStart(2, "0")}-${french[1].padStart(2, "0")}`;
  const parsed = Date.parse(text);
  return Number.isNaN(parsed) ? "" : new Date(parsed).toISOString().slice(0, 10);
}

function formatDate(value) {
  const iso = dateToISO(value);
  if (!iso) return "";
  const [year, month, day] = iso.split("-");
  return `${day}/${month}/${year}`;
}

function todayISO() { return new Date().toISOString().slice(0, 10); }
function nowISO() { return new Date().toISOString(); }

function makeEl(tag, className, text) {
  const node = document.createElement(tag);
  if (className) node.className = className;
  if (text !== undefined) node.textContent = text;
  return node;
}

function truncate(text, max = 170) {
  const value = asText(text).trim();
  return value.length > max ? `${value.slice(0, max).trim()}…` : value;
}

function normalizeStatus(value) { return normalizeKey(value); }
function isClosedStatus(value) {
  const status = normalizeStatus(value);
  return CLOSED_STATUS_WORDS.some((word) => status === word || status.startsWith(word));
}
function priorityRank(value) { return PRIORITY_RANK[normalizeKey(value)] ?? 99; }
function isUrgent(value) { return priorityRank(value) <= 1; }

function isOverdue(dateValue, status) {
  if (!dateValue || isClosedStatus(status)) return false;
  const iso = dateToISO(dateValue);
  if (!iso) return false;
  const due = new Date(`${iso}T00:00:00`);
  const today = new Date();
  today.setHours(0, 0, 0, 0);
  return due.getTime() < today.getTime();
}

function statusBadgeClass(value) {
  const key = normalizeStatus(value);
  if (key.includes("incomplet") || key.includes("attente") || key.includes("nouveau") || key.includes("cours") || key.includes("test")) return "badge--incomplete";
  if (key === "complet" || key === "complete" || isClosedStatus(value)) return "badge--complete";
  if (key === "na" || key.includes("nonapplicable")) return "badge--na";
  return "badge--status";
}

// Top-right workflow badges intentionally use colour only for DT ownership
// and completion. All other steps/statuses remain neutral.
function workflowBadgeClass(value) {
  const key = normalizeStatus(value);
  if (key === "encoursdt") return "badge--dt";
  if (key === "termine" || key === "terminee") return "badge--done";
  return "badge--workflow";
}

function priorityBadgeClass(value) {
  const key = normalizeKey(value);
  if (["p0", "haute"].includes(key)) return "badge--p0";
  if (key === "p1") return "badge--p1";
  if (["p2", "moyenne"].includes(key)) return "badge--p2";
  if (["p3", "basse"].includes(key)) return "badge--p3";
  if (key === "p4") return "badge--p4";
  return "";
}

async function safeFetchTable(tableId) {
  if (!tableId) throw new Error("Identifiant de table vide");
  if (!window.grist || !grist.docApi || typeof grist.docApi.fetchTable !== "function") {
    throw new Error("API documentaire Grist indisponible. Vérifiez l’accès complet au document.");
  }
  return withTimeout(grist.docApi.fetchTable(tableId), `Lecture de ${tableId}`);
}

async function refreshTableIds() {
  allTableIds = [];
  if (!window.grist || !grist.docApi || typeof grist.docApi.listTables !== "function") return allTableIds;
  try {
    const ids = await withTimeout(grist.docApi.listTables(), "Liste des tables");
    allTableIds = Array.isArray(ids) ? ids : [];
  } catch (error) {
    console.warn("listTables indisponible", error);
    allTableIds = [];
  }
  return allTableIds;
}

async function findTableId(def, override) {
  if (override) return override;
  if (!allTableIds.length) await refreshTableIds();
  const visibleIds = allTableIds.filter((id) => !String(id).startsWith("_grist_"));

  for (const candidate of def.candidates) {
    const exact = visibleIds.find((id) => id === candidate);
    if (exact) return exact;
  }
  for (const candidate of def.candidates) {
    const normalized = visibleIds.find((id) => normalizeKey(id) === normalizeKey(candidate));
    if (normalized) return normalized;
  }
  const fuzzy = visibleIds.find((id) => def.fuzzy.every((part) => normalizeKey(id).includes(normalizeKey(part))));
  return fuzzy || null;
}

async function loadMetadata() {
  metadataByTable = new Map();
  columnMetaById = new Map();
  try {
    const tables = tableRows(await safeFetchTable("_grist_Tables"));
    const columns = tableRows(await safeFetchTable("_grist_Tables_column"));
    const tableNameByMetaId = new Map(tables.map((row) => [Number(row.id), row.tableId]));

    columns.forEach((row) => {
      const tableId = tableNameByMetaId.get(Number(row.parentId));
      if (!tableId) return;
      const meta = {
        metaId: Number(row.id),
        tableId,
        colId: row.colId,
        label: row.label || row.colId,
        type: row.type || "Any",
        isFormula: Boolean(row.isFormula),
        visibleColMetaId: Number(row.visibleCol || 0),
        displayColMetaId: Number(row.displayCol || 0)
      };
      columnMetaById.set(meta.metaId, meta);
      if (!metadataByTable.has(tableId)) metadataByTable.set(tableId, new Map());
      metadataByTable.get(tableId).set(row.colId, meta);
    });

    columnMetaById.forEach((meta) => {
      const refMatch = /^(?:Ref|RefList):(.+)$/.exec(meta.type || "");
      meta.refTableId = refMatch ? refMatch[1] : "";
      const visible = columnMetaById.get(meta.visibleColMetaId);
      const display = columnMetaById.get(meta.displayColMetaId);
      meta.visibleTableId = visible?.tableId || "";
      meta.visibleColId = visible?.colId || "";
      meta.displayTableId = display?.tableId || "";
      meta.displayColId = display?.colId || "";
    });
  } catch (error) {
    console.warn("Métadonnées de colonnes indisponibles, utilisation du mode de secours.", error);
  }
}

function referenceTarget(type) {
  const match = /^(?:Ref|RefList):(.+)$/.exec(type || "");
  return match ? match[1] : "";
}

function chooseReferenceDisplayColumn(tableId, raw) {
  const sourcePreferred = [];
  Object.values(runtimeTables).forEach((table) => {
    if (!table?.meta) return;
    table.meta.forEach((meta) => {
      if (meta.refTableId === tableId && meta.visibleTableId === tableId && meta.visibleColId) sourcePreferred.push(meta.visibleColId);
    });
  });
  const keys = Object.keys(raw || {}).filter((key) => key !== "id");
  for (const preferred of sourcePreferred) if (keys.includes(preferred)) return preferred;

  const targetMeta = metadataByTable.get(tableId) || new Map();
  const preferredAliases = [
    "nom", "nomlong", "libelle", "valeur", "statut", "intitule", "titre",
    "denomination", "name", "label", "code"
  ];
  for (const alias of preferredAliases) {
    const key = keys.find((candidate) => {
      const meta = targetMeta.get(candidate);
      return normalizeKey(candidate) === alias || normalizeKey(meta?.label) === alias;
    });
    if (key) return key;
  }

  return keys.find((key) => {
    const type = targetMeta.get(key)?.type || "";
    return !type.startsWith("Attachments") && !type.startsWith("RefList:") && !type.startsWith("Ref:");
  }) || keys[0] || "";
}

async function loadReferenceCatalogs() {
  referenceCatalogs = new Map();
  const targets = new Set();
  Object.values(runtimeTables).forEach((table) => {
    if (!table?.meta) return;
    table.meta.forEach((meta) => { if (meta.refTableId) targets.add(meta.refTableId); });
  });

  await Promise.all([...targets].map(async (tableId) => {
    try {
      const raw = await safeFetchTable(tableId);
      const rows = tableRows(raw);
      const displayCol = chooseReferenceDisplayColumn(tableId, raw);
      const items = rows.map((row) => {
        let label = displayCol ? asText(row[displayCol]).trim() : "";
        if (!label || label === "0") label = `#${row.id}`;
        return { id: Number(row.id), label, rawRow: row };
      }).filter((item) => item.id);
      referenceCatalogs.set(tableId, {
        tableId,
        displayCol,
        items,
        byId: new Map(items.map((item) => [item.id, item]))
      });
    } catch (error) {
      console.warn(`Référentiel ${tableId} non chargé`, error);
    }
  }));
}

function displayRawValue(raw, meta) {
  if (raw === null || raw === undefined || raw === "" || raw === 0 || raw === "0") return "";
  const type = meta?.type || "Any";
  const target = referenceTarget(type);
  if (target) {
    const catalog = referenceCatalogs.get(target);
    const resolveOne = (value) => {
      if (value === null || value === undefined || value === "" || value === 0 || value === "0") return "";
      const numeric = Number(value);
      return catalog?.byId.get(numeric)?.label || asText(value);
    };
    if (type.startsWith("RefList:")) return listValues(raw).map(resolveOne).filter(Boolean).join(", ");
    return resolveOne(raw);
  }
  if (type === "ChoiceList") return listValues(raw).map(asText).filter(Boolean).join(", ");
  return asText(raw);
}

function displayFieldValue(table, row, key) {
  const colId = table?.columns?.[key];
  if (!colId) return "";
  return displayRawValue(row?.[colId], columnMeta(table, colId));
}

function referenceItemsForMeta(meta) {
  const target = referenceTarget(meta?.type || "");
  return referenceCatalogs.get(target)?.items || [];
}

function resolveColumn(rawData, tableId, aliases) {
  const keys = Object.keys(rawData || {}).filter((key) => key !== "id");
  const tableMeta = metadataByTable.get(tableId) || new Map();
  const candidates = keys.map((key) => ({
    key,
    keyNorm: normalizeKey(key),
    labelNorm: normalizeKey(tableMeta.get(key)?.label || key)
  }));
  const aliasNorms = aliases.map(normalizeKey);

  for (const alias of aliasNorms) {
    const exact = candidates.find((item) => item.keyNorm === alias || item.labelNorm === alias);
    if (exact) return exact.key;
  }
  for (const alias of aliasNorms) {
    const partial = candidates.find((item) => item.keyNorm.includes(alias) || item.labelNorm.includes(alias) || alias.includes(item.keyNorm));
    if (partial) return partial.key;
  }
  return null;
}

async function loadOneTable(key) {
  const def = TABLE_DEFS[key];
  const override = widgetOptions.tableIds?.[key];
  const tableId = await findTableId(def, override);
  if (!tableId) {
    if (def.optional) return { key, def, missing: true, optional: true, error: null, rows: [], columns: {}, tableId: null, raw: {} };
    return { key, def, missing: true, optional: false, error: `Table « ${def.label} » introuvable`, rows: [], columns: {}, tableId: null, raw: {} };
  }

  try {
    const raw = await safeFetchTable(tableId);
    const columns = {};
    Object.entries(def.fields).forEach(([fieldKey, aliases]) => {
      columns[fieldKey] = resolveColumn(raw, tableId, aliases);
    });
    return { key, def, tableId, raw, rows: tableRows(raw), columns, missing: false, error: null, meta: metadataByTable.get(tableId) || new Map() };
  } catch (error) {
    return { key, def, tableId, raw: {}, rows: [], columns: {}, missing: true, optional: Boolean(def.optional), error: error.message || String(error), meta: new Map() };
  }
}

function fieldValue(table, row, key) {
  const colId = table?.columns?.[key];
  return colId ? row?.[colId] : "";
}

function buildActorLabel(row, table) {
  const direct = displayFieldValue(table, row, "name").trim();
  const first = displayFieldValue(table, row, "firstName").trim();
  const last = displayFieldValue(table, row, "lastName").trim();
  const email = displayFieldValue(table, row, "email").trim();
  const organisation = displayFieldValue(table, row, "organisation").trim();
  const name = direct || [first, last].filter(Boolean).join(" ") || email || `Acteur #${row.id}`;
  return { id: Number(row.id), label: name, email, organisation };
}

function loadCatalogs() {
  services = [];
  actors = [];
  serviceById = new Map();
  actorById = new Map();

  const serviceTable = runtimeTables.services;
  if (serviceTable && !serviceTable.missing) {
    services = serviceTable.rows.map((row) => {
      const name = displayFieldValue(serviceTable, row, "name").trim();
      const longName = displayFieldValue(serviceTable, row, "longName").trim();
      const label = name || longName || `Service #${row.id}`;
      return {
        id: Number(row.id),
        label,
        name,
        longName,
        nationalCommunity: displayFieldValue(serviceTable, row, "nationalCommunity"),
        department: displayFieldValue(serviceTable, row, "department"),
        deployPriority: displayFieldValue(serviceTable, row, "deployPriority"),
        deploymentStatus: displayFieldValue(serviceTable, row, "deploymentStatus") || displayFieldValue(serviceTable, row, "matrixProgress"),
        deployTarget: fieldValue(serviceTable, row, "deployTarget"),
        matrixProgress: displayFieldValue(serviceTable, row, "matrixProgress"),
        deploymentLeadRaw: fieldValue(serviceTable, row, "deploymentLead"),
        rawRow: row
      };
    }).filter((service) => service.id && service.label)
      .sort((a, b) => a.label.localeCompare(b.label, "fr"));
    services.forEach((service) => serviceById.set(service.id, service));
  }

  const actorTable = runtimeTables.actors;
  if (actorTable && !actorTable.missing) {
    actors = actorTable.rows.map((row) => buildActorLabel(row, actorTable))
      .filter((actor) => actor.id && actor.label)
      .sort((a, b) => a.label.localeCompare(b.label, "fr"));
    actors.forEach((actor) => actorById.set(actor.id, actor));
  }
}

function catalogLabel(raw, catalogMap, fallbackPrefix) {
  if (raw === null || raw === undefined || raw === "") return "";
  if (typeof raw === "number") return catalogMap.get(Number(raw))?.label || `${fallbackPrefix} #${raw}`;
  if (Array.isArray(raw)) return listValues(raw).map((item) => catalogLabel(item, catalogMap, fallbackPrefix)).filter(Boolean).join(", ");
  const text = asText(raw).trim();
  const numeric = Number(text);
  if (Number.isInteger(numeric) && catalogMap.has(numeric)) return catalogMap.get(numeric).label;
  return text;
}

function serviceLabel(raw) { return catalogLabel(raw, serviceById, "Service"); }
function actorLabel(raw) { return catalogLabel(raw, actorById, "Acteur"); }

function serviceTokens(raw) {
  if (raw === null || raw === undefined || raw === "") return [];
  if (typeof raw === "number") return [String(raw), normalizeKey(serviceLabel(raw))];
  if (Array.isArray(raw)) return listValues(raw).flatMap(serviceTokens);
  return asText(raw).split(/[,;\n|]+/).map((token) => normalizeKey(token.trim())).filter(Boolean);
}

function rawIsCommonSubject(raw) {
  return serviceTokens(raw).some((token) => ["tous", "toutes", "all"].includes(token));
}

function rawAppliesToService(raw, service) {
  if (!service) return true;
  const tokens = serviceTokens(raw);
  if (tokens.some((token) => ["tous", "toutes", "all"].includes(token))) return true;
  const serviceKeys = new Set([
    String(service.id),
    normalizeKey(service.label),
    normalizeKey(service.name),
    normalizeKey(service.longName)
  ].filter(Boolean));
  return tokens.some((token) => serviceKeys.has(token));
}

function rawMatchesSelectedService(raw) {
  return !selectedService || rawAppliesToService(raw, selectedService);
}

function serviceMatchesDimensionFilters(service) {
  if (filters.community && service.nationalCommunity !== filters.community) return false;
  if (filters.department && service.department !== filters.department) return false;
  if (filters.deploymentStatus && service.deploymentStatus !== filters.deploymentStatus) return false;
  if (filters.deploymentPriority && service.deployPriority !== filters.deploymentPriority) return false;
  return true;
}

function hasServiceDimensionFilters() {
  return Boolean(filters.community || filters.department || filters.deploymentStatus || filters.deploymentPriority);
}

function hasWorkFilters() {
  return Boolean(filters.search || filters.status || filters.priority || filters.hideClosed || filters.hideCommonSubjects);
}

function subjectMatchesWorkFilters(subject) {
  if (filters.hideCommonSubjects && rawIsCommonSubject(subject.serviceRaw)) return false;
  if (filters.hideClosed && isClosedStatus(subject.status)) return false;
  if (filters.status && subject.status !== filters.status) return false;
  if (filters.priority && subject.priority !== filters.priority) return false;
  const query = normalizeKey(filters.search);
  if (query) {
    const haystack = normalizeKey([
      subject.title, subject.service, subject.status, subject.stage, subject.category,
      subject.priority, subject.description, subject.owner, subject.caseType
    ].join(" "));
    if (!haystack.includes(query)) return false;
  }
  return true;
}

function subjectMatchesServiceScope(subject) {
  if (selectedService) return serviceMatchesDimensionFilters(selectedService) && rawAppliesToService(subject.serviceRaw, selectedService);
  if (!hasServiceDimensionFilters()) return true;
  return services.some((service) => serviceMatchesDimensionFilters(service) && rawAppliesToService(subject.serviceRaw, service));
}

function availableServicesForPicker() {
  let candidates = services.filter(serviceMatchesDimensionFilters);
  if (hasWorkFilters()) {
    const subjects = allSubjects();
    candidates = candidates.filter((service) => subjects.some((subject) => rawAppliesToService(subject.serviceRaw, service) && subjectMatchesWorkFilters(subject)));
  }
  return candidates;
}

function isRtuAwaiting(status) {
  const normalized = normalizeStatus(status);
  return !normalized || normalized === "enattentecompletionrtu" || normalized.includes("attentecompletionrtu");
}

function rtuDomainState(table, row) {
  const keys = ["raccordements", "wifi", "applications", "messagerie", "emm", "passerellage", "mdg"];
  const values = keys.map((key) => ({ key, value: displayFieldValue(table, row, key).trim() }));
  const completed = values.filter(({ value }) => {
    const normalized = normalizeStatus(value);
    return normalized === "complet" || normalized === "complete" || normalized === "na" || normalized.includes("nonapplicable");
  }).length;
  const filled = values.filter(({ value }) => Boolean(value)).length;
  return { values, completed, filled, total: values.length, percent: Math.round((completed / values.length) * 100) };
}

function normalizeSubject(sourceKey, table, row) {
  const serviceRaw = fieldValue(table, row, "service");
  const base = {
    source: sourceKey,
    tableId: table.tableId,
    rowId: Number(row.id),
    rawRow: row,
    table,
    serviceRaw,
    service: serviceLabel(serviceRaw),
    status: displayFieldValue(table, row, "status").trim(),
    stage: displayFieldValue(table, row, "stage").trim(),
    category: displayFieldValue(table, row, "category").trim(),
    priority: displayFieldValue(table, row, "priority").trim(),
    description: displayFieldValue(table, row, "description").trim(),
    owner: "",
    date: "",
    title: "",
    caseType: ""
  };

  if (sourceKey === "rtu") {
    const version = displayFieldValue(table, row, "version").trim();
    const receivedDate = fieldValue(table, row, "receivedDate");
    base.version = version;
    base.receivedDate = receivedDate;
    base.title = version ? `RTU ${version}` : "RTU";
    base.owner = actorLabel(fieldValue(table, row, "owner"));
    base.description = displayFieldValue(table, row, "comment").trim();
    base.rtuState = rtuDomainState(table, row);
    base.rtuWaiting = isRtuAwaiting(base.status);
  } else if (sourceKey === "infra") {
    base.title = displayFieldValue(table, row, "title").trim() || base.category || "Sujet Infra & Flux";
    base.date = fieldValue(table, row, "requestDate");
    base.owner = actorLabel(fieldValue(table, row, "owners"));
    base.description = base.description || displayFieldValue(table, row, "nextActions").trim() || displayFieldValue(table, row, "comment").trim();
  } else if (sourceKey === "emm") {
    base.caseType = displayFieldValue(table, row, "caseType").trim();
    const serviceType = displayFieldValue(table, row, "serviceType").trim();
    base.title = serviceType || base.category || truncate(base.description, 65) || "Sujet EMM";
    base.date = fieldValue(table, row, "desiredDate");
    base.owner = actorLabel(fieldValue(table, row, "assignees"));
  } else if (sourceKey === "conception") {
    base.title = displayFieldValue(table, row, "title").trim() || base.category || "Chantier de conception";
    base.date = fieldValue(table, row, "mepDate");
    base.owner = actorLabel(fieldValue(table, row, "owners"));
    base.description = base.description || displayFieldValue(table, row, "nextActions").trim() || displayFieldValue(table, row, "actionsDone").trim();
  }
  return base;
}

function allSubjects() {
  return ["rtu", "infra", "emm", "conception"].flatMap((sourceKey) => {
    const table = runtimeTables[sourceKey];
    if (!table || table.missing) return [];
    return table.rows.map((row) => normalizeSubject(sourceKey, table, row));
  });
}

function subjectMatchesFilters(subject) {
  return subjectMatchesServiceScope(subject) && subjectMatchesWorkFilters(subject);
}

function sortSubjects(subjects) {
  return [...subjects].sort((a, b) => {
    if (a.source === "rtu" && b.source === "rtu") {
      const dateA = Date.parse(dateToISO(a.receivedDate)) || 0;
      const dateB = Date.parse(dateToISO(b.receivedDate)) || 0;
      return dateB - dateA || b.rowId - a.rowId;
    }
    return priorityRank(a.priority) - priorityRank(b.priority)
      || compareDate(a.date, b.date)
      || a.title.localeCompare(b.title, "fr");
  });
}

function compareDate(a, b) {
  const first = Date.parse(dateToISO(a)) || 8640000000000000;
  const second = Date.parse(dateToISO(b)) || 8640000000000000;
  return first - second;
}

function activeSubjects() { return sortSubjects(allSubjects().filter(subjectMatchesFilters)); }

function uniqueValues(values) {
  return [...new Set(values.map((value) => asText(value).trim()).filter(Boolean))].sort((a, b) => a.localeCompare(b, "fr"));
}

function refreshServiceDimensionFilters() {
  fillSimpleSelect($("communityFilter"), uniqueValues(services.map((service) => service.nationalCommunity)), "Toutes les communautés", filters.community);
  fillSimpleSelect($("departmentFilter"), uniqueValues(services.map((service) => service.department)), "Tous les départements", filters.department);
  fillSimpleSelect($("deploymentStatusFilter"), uniqueValues(services.map((service) => service.deploymentStatus)), "Tous les statuts", filters.deploymentStatus);
  fillSimpleSelect($("deploymentPriorityFilter"), uniqueValues(services.map((service) => service.deployPriority)), "Toutes les priorités", filters.deploymentPriority);
  filters.community = $("communityFilter").value;
  filters.department = $("departmentFilter").value;
  filters.deploymentStatus = $("deploymentStatusFilter").value;
  filters.deploymentPriority = $("deploymentPriorityFilter").value;
}

function refreshFilterOptions(subjects) {
  const statuses = uniqueValues(subjects.map((item) => item.status));
  const priorities = uniqueValues(subjects.map((item) => item.priority));
  fillSimpleSelect($("statusFilter"), statuses, "Tous les statuts", filters.status);
  fillSimpleSelect($("priorityFilter"), priorities, "Toutes les priorités", filters.priority);
  filters.status = $("statusFilter").value;
  filters.priority = $("priorityFilter").value;
}

function fillSimpleSelect(select, values, firstLabel, current) {
  select.replaceChildren();
  const first = document.createElement("option");
  first.value = "";
  first.textContent = firstLabel;
  select.appendChild(first);
  values.forEach((value) => {
    const option = document.createElement("option");
    option.value = value;
    option.textContent = value;
    select.appendChild(option);
  });
  select.value = values.includes(current) ? current : "";
}

function renderServiceProfile() {
  const profile = $("serviceProfile");
  profile.replaceChildren();
  if (!selectedService) {
    profile.className = "service-profile hidden";
    return;
  }

  profile.className = "service-profile";
  const main = makeEl("div", "profile-main");
  main.appendChild(makeEl("div", "profile-title", selectedService.label));
  main.appendChild(makeEl("div", "profile-subtitle", selectedService.longName || selectedService.nationalCommunity || "Service utilisateur"));
  profile.appendChild(main);

  const fields = [
    ["Communauté", selectedService.nationalCommunity || "—"],
    ["Département", selectedService.department || "—"],
    ["Statut déploiement", selectedService.deploymentStatus || "—"],
    ["Priorité déploiement", selectedService.deployPriority || "—"],
    ["Date cible", formatDate(selectedService.deployTarget) || asText(selectedService.deployTarget) || "—"],
    ["Chef de déploiement", actorLabel(selectedService.deploymentLeadRaw) || "—"]
  ];
  fields.forEach(([label, value]) => {
    const field = makeEl("div", "profile-field");
    field.appendChild(makeEl("div", "profile-field__label", label));
    field.appendChild(makeEl("div", "profile-field__value", value));
    profile.appendChild(field);
  });
}

function renderKpis(subjects) {
  const work = subjects.filter((item) => item.source !== "rtu");
  const items = [
    ["Sujets en cours", work.filter((item) => !isClosedStatus(item.status)).length, "kpi--info"],
    ["P0 ou P1", work.filter((item) => isUrgent(item.priority) && !isClosedStatus(item.status)).length, "kpi--warning"],
    ["En retard", work.filter((item) => isOverdue(item.date, item.status)).length, "kpi--danger"]
  ];
  const bar = $("kpiBar");
  bar.replaceChildren();
  items.forEach(([label, value, className]) => {
    const card = makeEl("div", `kpi ${className}`);
    card.appendChild(makeEl("div", "kpi__label", label));
    card.appendChild(makeEl("div", "kpi__value", String(value)));
    bar.appendChild(card);
  });
}

function addBadge(container, value, className = "") {
  if (!value) return;
  container.appendChild(makeEl("span", `badge ${className}`.trim(), value));
}

function appendRtuInfo(container, label, value) {
  const item = makeEl("div", "rtu-info-item");
  item.appendChild(makeEl("div", "rtu-info-label", label));
  item.appendChild(makeEl("div", "rtu-info-value", value || "Non renseignée"));
  container.appendChild(item);
}

function rtuVersionForTitle(value) {
  const cleaned = asText(value).trim().replace(/^v[\s._-]*/i, "");
  return cleaned ? `v${cleaned}` : "";
}

function appendRtuDateInline(container, value) {
  const row = makeEl("div", "rtu-date-inline");
  row.appendChild(makeEl("span", "rtu-date-inline__label", "Date de réception :"));
  row.appendChild(
    makeEl(
      "span",
      "rtu-date-inline__value",
      formatDate(value) || asText(value) || "Non renseignée"
    )
  );
  container.appendChild(row);
}

function appendRtuProgressMinimal(container, state) {
  const completed = Number(state?.completed || 0);
  const total = Number(state?.total || 7) || 7;
  const percent = Math.max(0, Math.min(100, Math.round((completed / total) * 100)));
  const wrapper = makeEl("div", "rtu-mini-progress");
  const track = makeEl("div", "progress-track");
  const bar = makeEl("div", "progress-bar");
  bar.style.width = `${percent}%`;
  track.appendChild(bar);
  wrapper.appendChild(track);
  wrapper.appendChild(makeEl("span", "rtu-mini-progress__value", `${completed}/${total}`));
  container.appendChild(wrapper);
}

function renderRtuCard(subject, inline = false) {
  const card = makeEl("article", `subject-card subject-card--rtu${inline ? " rtu-inline-detail" : ""}`);
  card.addEventListener("click", () => openDrawer(subject));

  const top = makeEl("div", "subject-top");
  const left = makeEl("div", inline ? "rtu-inline-heading" : "");
  const shownStatus = subject.rtuWaiting ? "En attente complétion RTU" : (subject.status || "Statut non renseigné");
  const shownStage = subject.stage || "Étape non renseignée";

  if (!inline) {
    const version = rtuVersionForTitle(subject.version);
    const title = [subject.service || "Service non renseigné", version].filter(Boolean).join(" ");
    left.appendChild(makeEl("div", "subject-title", title));
  }
  top.appendChild(left);

  const workflow = makeEl("div", "workflow-stack");
  addBadge(workflow, shownStage, workflowBadgeClass(subject.stage));
  addBadge(workflow, shownStatus, workflowBadgeClass(shownStatus));
  top.appendChild(workflow);
  card.appendChild(top);

  appendRtuDateInline(card, subject.receivedDate);
  if (!subject.rtuWaiting) appendRtuProgressMinimal(card, subject.rtuState);
  return card;
}

function normalizeEmmCategory(value) {
  const key = normalizeKey(value);
  if (key.includes("kiosque")) return "kiosque";
  if ((key.includes("politique") && key.includes("verrouillage")) || key.includes("lockdown")) return "politique_verrouillage";
  if (key.includes("wifi")) return "wifi";
  if (key.includes("messagerie") || key.includes("mail") || key.includes("email")) return "messagerie";
  if ((key.includes("push") && (key.includes("webapp") || key.includes("lienweb"))) || key.includes("pushlienwebapp")) return "push_webapp";
  if (key.includes("proxy") && key.includes("vip")) return "proxy_vip";
  return "autres";
}

function statusCountEntries(subjects) {
  const counts = new Map();
  subjects.forEach((subject) => {
    const status = subject.status || "Non renseigné";
    counts.set(status, (counts.get(status) || 0) + 1);
  });
  return [...counts.entries()].sort((a, b) => b[1] - a[1] || a[0].localeCompare(b[0], "fr"));
}

function singleServiceEmmSummary(subjects, scopedSubjects) {
  if (!subjects.length && scopedSubjects.length) return { label: "Masqué par les filtres", className: "badge--status" };
  if (!scopedSubjects.length) return { label: "N.A.", className: "badge--na" };
  const statuses = uniqueValues(subjects.map((subject) => subject.status || "Non renseigné"));
  if (subjects.every((subject) => isClosedStatus(subject.status) || ["complet", "complete"].includes(normalizeStatus(subject.status)))) {
    return { label: "Complet", className: "badge--complete" };
  }
  if (statuses.length === 1) return { label: statuses[0], className: statusBadgeClass(statuses[0]) };
  return null;
}

function emmCategoryDefinitions(subjects, scopedSubjects) {
  const definitions = [...EMM_CATEGORY_DEFS];
  const hasOthers = [...subjects, ...scopedSubjects].some((subject) => normalizeEmmCategory(subject.category) === "autres");
  if (hasOthers) definitions.push({ key: "autres", label: "Autres" });
  return definitions;
}

function selectedStatusesForEmmCategory(categoryKey) {
  if (!emmFilterState.statuses.has(categoryKey)) {
    emmFilterState.statuses.set(categoryKey, new Set());
  }
  return emmFilterState.statuses.get(categoryKey);
}

function clearEmmFilters() {
  emmFilterState.categories.clear();
  emmFilterState.statuses.clear();
  emmFilterState.priorities.clear();
  rerenderEmmOnly();
}

function toggleEmmCategory(categoryKey) {
  if (emmFilterState.categories.has(categoryKey)) {
    emmFilterState.categories.delete(categoryKey);
    emmFilterState.statuses.delete(categoryKey);
  } else {
    emmFilterState.categories.add(categoryKey);
  }
  rerenderEmmOnly();
}

function toggleEmmStatus(categoryKey, status) {
  emmFilterState.categories.add(categoryKey);
  const selected = selectedStatusesForEmmCategory(categoryKey);
  if (selected.has(status)) selected.delete(status);
  else selected.add(status);
  rerenderEmmOnly();
}

function filterEmmSubjectsByCategory(subjects) {
  if (!emmFilterState.categories.size) return subjects;
  return subjects.filter((subject) => {
    const categoryKey = normalizeEmmCategory(subject.category);
    if (!emmFilterState.categories.has(categoryKey)) return false;
    const selectedStatuses = emmFilterState.statuses.get(categoryKey);
    if (!selectedStatuses || !selectedStatuses.size) return true;
    return selectedStatuses.has(subject.status || "Non renseigné");
  });
}

function filterEmmSubjects(subjects) {
  const categoryFiltered = filterEmmSubjectsByCategory(subjects);
  if (!emmFilterState.priorities.size) return categoryFiltered;
  return categoryFiltered.filter((subject) => emmFilterState.priorities.has(subject.priority || "Non renseignée"));
}

function toggleEmmPriority(priority) {
  if (emmFilterState.priorities.has(priority)) emmFilterState.priorities.delete(priority);
  else emmFilterState.priorities.add(priority);
  rerenderEmmOnly();
}

function renderEmmPriorityIndicators(subjects) {
  const container = $("emmPriorityIndicators");
  if (!container) return;
  container.replaceChildren();

  const categoryFiltered = filterEmmSubjectsByCategory(subjects);
  const priorities = uniqueValues(subjects.map((subject) => subject.priority))
    .sort((a, b) => priorityRank(a) - priorityRank(b) || a.localeCompare(b, "fr"));

  // Remove stale local selections when global filters no longer expose a priority.
  [...emmFilterState.priorities].forEach((priority) => {
    if (!priorities.includes(priority)) emmFilterState.priorities.delete(priority);
  });

  priorities.forEach((priority) => {
    const count = categoryFiltered.filter((subject) => subject.priority === priority).length;
    const selected = emmFilterState.priorities.has(priority);
    const button = makeEl(
      "button",
      `emm-priority-filter ${priorityBadgeClass(priority)} ${selected ? "is-selected" : ""}`.trim()
    );
    button.type = "button";
    button.setAttribute("aria-pressed", String(selected));
    button.title = selected ? `Retirer le filtre ${priority}` : `Filtrer les sujets EMM sur ${priority}`;
    button.appendChild(makeEl("span", "", priority));
    button.appendChild(makeEl("span", "emm-priority-filter__count", String(count)));
    button.addEventListener("click", () => toggleEmmPriority(priority));
    container.appendChild(button);
  });
}

function renderEmmFilterSummary(container, subjects, scopedSubjects) {
  if (selectedService) {
    const summary = singleServiceEmmSummary(subjects, scopedSubjects);
    if (summary) {
      addBadge(container, summary.label, summary.className);
      return;
    }
  }
  const entries = statusCountEntries(subjects);
  if (!entries.length) {
    addBadge(container, selectedService ? "N.A." : "0", "badge--na");
    return;
  }
  entries.forEach(([status, count]) => addBadge(container, `${status} · ${count}`, statusBadgeClass(status)));
}

function renderEmmCategoryFilter(definition, subjects, scopedSubjects) {
  const isSelected = emmFilterState.categories.has(definition.key);
  const item = makeEl("div", `emm-filter-item ${isSelected ? "is-selected" : ""}`.trim());

  const mainButton = makeEl("button", "emm-filter-main");
  mainButton.type = "button";
  mainButton.setAttribute("aria-pressed", String(isSelected));
  mainButton.title = isSelected ? "Retirer ce filtre" : "Filtrer sur cette catégorie";

  const heading = makeEl("span", "emm-filter-heading");
  heading.appendChild(makeEl("span", "emm-filter-label", definition.label));
  heading.appendChild(makeEl("span", "emm-filter-count", String(subjects.length)));
  mainButton.appendChild(heading);
  mainButton.addEventListener("click", () => toggleEmmCategory(definition.key));
  item.appendChild(mainButton);

  return item;
}

function rerenderEmmOnly() {
  const subjects = activeSubjects().filter((subject) => subject.source === "emm");
  renderEmmList(subjects);
}

function renderEmmList(subjects) {
  const list = $("emmList");
  const count = $("emmCount");
  list.replaceChildren();
  const table = runtimeTables.emm;
  if (table?.error) {
    count.textContent = "0";
    const indicators = $("emmPriorityIndicators");
    if (indicators) indicators.replaceChildren();
    list.appendChild(makeEl("div", "empty-state error-state", table.error));
    return;
  }

  renderEmmPriorityIndicators(subjects);

  const scopedSubjects = allSubjects().filter((subject) => subject.source === "emm" && subjectMatchesServiceScope(subject));
  const definitions = emmCategoryDefinitions(subjects, scopedSubjects);

  const toolbar = makeEl("div", "emm-filter-toolbar");

  const filterGrid = makeEl("div", "emm-filter-grid");
  definitions.forEach((definition) => {
    const categorySubjects = subjects.filter((subject) => normalizeEmmCategory(subject.category) === definition.key);
    const scopedCategorySubjects = scopedSubjects.filter((subject) => normalizeEmmCategory(subject.category) === definition.key);
    filterGrid.appendChild(renderEmmCategoryFilter(definition, categorySubjects, scopedCategorySubjects));
  });
  toolbar.appendChild(filterGrid);

  const footer = makeEl("div", "emm-filter-footer");
  const filterDescriptions = [];
  if (emmFilterState.categories.size) filterDescriptions.push(`${emmFilterState.categories.size} catégorie(s)`);
  if (emmFilterState.priorities.size) filterDescriptions.push(`${emmFilterState.priorities.size} priorité(s)`);
  footer.appendChild(
    makeEl(
      "div",
      "emm-filter-toolbar__hint",
      filterDescriptions.length
        ? `${filterDescriptions.join(" et ")} sélectionnée(s)`
        : "Aucun filtre : tous les sujets sont affichés"
    )
  );
  const resetButton = makeEl("button", "emm-clear-filters", "Désélectionner tout");
  resetButton.type = "button";
  resetButton.disabled = !emmFilterState.categories.size && !emmFilterState.priorities.size;
  resetButton.addEventListener("click", clearEmmFilters);
  footer.appendChild(resetButton);
  toolbar.appendChild(footer);

  list.appendChild(toolbar);

  const displayedSubjects = filterEmmSubjects(subjects);
  count.textContent = String(displayedSubjects.length);
  const subjectGrid = makeEl("div", "emm-subject-grid");
  if (!displayedSubjects.length) {
    subjectGrid.appendChild(makeEl("div", "empty-state", "Aucun sujet ne correspond aux filtres EMM sélectionnés."));
  } else {
    displayedSubjects.forEach((subject) => subjectGrid.appendChild(renderWorkCard(subject)));
  }
  list.appendChild(subjectGrid);
}

function renderWorkCard(subject) {
  const card = makeEl("article", `subject-card subject-card--${subject.source}`);
  card.addEventListener("click", () => openDrawer(subject));

  const top = makeEl("div", "subject-top");
  const left = makeEl("div");
  if (subject.source === "emm") {
    const combinedEmmTitle = [
      subject.service || "Service utilisateur non renseigné",
      subject.category || "Catégorie non renseignée"
    ].join(" - ");
    left.appendChild(makeEl("div", "subject-title", combinedEmmTitle));
  } else {
    left.appendChild(makeEl("div", "subject-title", subject.title));
    left.appendChild(makeEl("div", "subject-service", subject.service || "Service non renseigné"));
  }
  top.appendChild(left);

  const workflow = makeEl("div", "workflow-stack");
  if (subject.source === "emm") {
    addBadge(workflow, subject.status || "Statut non renseigné", workflowBadgeClass(subject.status));
  } else if (subject.source === "infra") {
    addBadge(workflow, subject.stage || "Étape non renseignée", workflowBadgeClass(subject.stage));
    addBadge(workflow, subject.status || "Statut non renseigné", workflowBadgeClass(subject.status));
  } else {
    addBadge(workflow, subject.stage || "Étape non renseignée", workflowBadgeClass(subject.stage));
  }
  top.appendChild(workflow);
  card.appendChild(top);

  const badges = makeEl("div", "badges");
  addBadge(badges, subject.priority, priorityBadgeClass(subject.priority));
  if (subject.source !== "emm") addBadge(badges, subject.category);
  addBadge(badges, subject.caseType);
  if (subject.source === "conception") {
    addBadge(badges, `Statut : ${subject.status || "Non renseigné"}`, "badge--workflow");
  }
  if (badges.childElementCount) card.appendChild(badges);

  if (subject.description) card.appendChild(makeEl("div", "subject-description", truncate(subject.description, 220)));

  const meta = makeEl("div", "subject-meta");
  const leftMeta = makeEl("div", "subject-meta__left");
  const rightMeta = makeEl("div", "subject-meta__right");

  if (subject.source === "emm") {
    leftMeta.appendChild(makeEl("span", "subject-owner", subject.owner || "Porteur non renseigné"));
  }

  const date = formatDate(subject.date) || asText(subject.date);
  if (date) {
    if (subject.source === "infra") {
      rightMeta.appendChild(makeEl("span", "subject-request-date", `Date demande : ${date}`));
    } else {
      const label = subject.source === "conception" ? "MEP" : "Échéance";
      rightMeta.appendChild(
        makeEl(
          "span",
          isOverdue(subject.date, subject.status) ? "overdue" : "",
          `${label} ${date}`
        )
      );
    }
  }

  if (leftMeta.childElementCount) meta.appendChild(leftMeta);
  if (rightMeta.childElementCount) meta.appendChild(rightMeta);
  if (meta.childElementCount) card.appendChild(meta);
  return card;
}

function renderSourceList(sourceKey, subjects) {
  const list = $(`${sourceKey}List`);
  const count = $(`${sourceKey}Count`);
  list.replaceChildren();
  count.textContent = String(subjects.length);
  const table = runtimeTables[sourceKey];
  if (table?.error) {
    const error = makeEl("div", "empty-state error-state", table.error);
    list.appendChild(error);
    return;
  }
  if (sourceKey === "emm") {
    // Les filtres de catégorie EMM restent disponibles même si aucun sujet
    // n'est visible avec les filtres globaux actuels.
    renderEmmList(subjects);
    return;
  }
  if (!subjects.length) {
    list.appendChild(makeEl("div", "empty-state", "Aucun élément pour les filtres sélectionnés."));
    return;
  }
  if (sourceKey === "rtu" && selectedService) {
    // There is one RTU per service: its content is rendered directly in the RTU panel.
    list.appendChild(renderRtuCard(subjects[0], true));
    return;
  }
  subjects.forEach((subject) => list.appendChild(sourceKey === "rtu" ? renderRtuCard(subject) : renderWorkCard(subject)));
}

function renderDashboard() {
  refreshServiceDimensionFilters();
  renderDashboardTitle();
  syncCommonSubjectsButton();
  Object.keys(sourceCollapseState).forEach(applySourceCollapseState);
  const all = allSubjects();
  const serviceScoped = all.filter(subjectMatchesServiceScope);
  refreshFilterOptions(serviceScoped);
  const subjects = activeSubjects();
  renderServiceProfile();
  renderKpis(subjects);
  ["rtu", "infra", "emm", "conception"].forEach((source) => {
    renderSourceList(source, subjects.filter((subject) => subject.source === source));
  });
}

function renderServiceDropdown(query = "") {
  const dropdown = $("serviceDropdown");
  dropdown.replaceChildren();
  const normalized = normalizeKey(query);
  const matches = availableServicesForPicker()
    .filter((service) => normalizeKey(`${service.label} ${service.longName} ${service.nationalCommunity} ${service.department} ${service.deploymentStatus} ${service.deployPriority}`).includes(normalized))
    .slice(0, 80);
  if (!matches.length) {
    dropdown.appendChild(makeEl("div", "combo-empty", "Aucun service ne correspond aux filtres actifs"));
    return;
  }
  matches.forEach((service, index) => {
    const button = makeEl("button", `combo-item ${index === serviceComboIndex ? "is-active" : ""}`.trim());
    button.type = "button";
    button.setAttribute("role", "option");
    const main = makeEl("span");
    main.appendChild(makeEl("span", "combo-item__name", service.label));
    const detail = [service.longName, service.nationalCommunity].filter(Boolean).join(" · ");
    if (detail) main.appendChild(makeEl("span", "combo-item__meta", detail));
    button.appendChild(main);
    button.appendChild(makeEl("span", "combo-item__meta", [service.department, service.deployPriority].filter(Boolean).join(" · ")));
    button.addEventListener("click", () => selectService(service));
    dropdown.appendChild(button);
  });
}

function openServiceDropdown() {
  serviceComboIndex = -1;
  renderServiceDropdown($("serviceSearch").value);
  $("serviceDropdown").classList.remove("hidden");
  $("serviceSearch").setAttribute("aria-expanded", "true");
}

function closeServiceDropdown() {
  $("serviceDropdown").classList.add("hidden");
  $("serviceSearch").setAttribute("aria-expanded", "false");
}

function selectService(service) {
  selectedService = service;
  $("serviceSearch").value = service.label;
  $("clearServiceBtn").classList.remove("hidden");
  closeServiceDropdown();
  renderDashboard();
}

function clearSelectedService() {
  selectedService = null;
  $("serviceSearch").value = "";
  $("clearServiceBtn").classList.add("hidden");
  closeServiceDropdown();
  renderDashboard();
}

function resetAllFilters() {
  selectedService = null;
  serviceComboIndex = -1;

  filters.community = "";
  filters.department = "";
  filters.deploymentStatus = "";
  filters.deploymentPriority = "";
  filters.search = "";
  filters.status = "";
  filters.priority = "";
  filters.hideClosed = false;
  filters.hideCommonSubjects = false;

  emmFilterState.categories.clear();
  emmFilterState.statuses.clear();
  emmFilterState.priorities.clear();

  const serviceSearch = $("serviceSearch");
  if (serviceSearch) serviceSearch.value = "";
  $("clearServiceBtn")?.classList.add("hidden");
  const globalSearch = $("globalSearch");
  if (globalSearch) globalSearch.value = "";
  ["communityFilter", "departmentFilter", "deploymentStatusFilter", "deploymentPriorityFilter", "statusFilter", "priorityFilter"].forEach((id) => {
    const control = $(id);
    if (control) control.value = "";
  });
  const hideClosed = $("hideClosedToggle");
  if (hideClosed) hideClosed.checked = false;

  closeServiceDropdown();
  renderDashboard();
  showToast("Filtres réinitialisés");
}

function columnMeta(table, colId) {
  return table?.meta?.get(colId) || { colId, label: colId, type: "Any", isFormula: false };
}

function fieldOptions(subject, fieldKey) {
  const table = subject.table;
  const colId = table.columns[fieldKey];
  if (!colId) return [];
  return uniqueValues(table.rows.map((row) => asText(row[colId])));
}

function targetCatalog(kind) {
  return kind === "service" ? services : kind === "actor" ? actors : [];
}

function targetCatalogMap(kind) {
  return kind === "service" ? serviceById : kind === "actor" ? actorById : new Map();
}

function createDatalist(id, values) {
  const list = document.createElement("datalist");
  list.id = id;
  values.forEach((value) => {
    const option = document.createElement("option");
    option.value = value;
    list.appendChild(option);
  });
  return list;
}

function inferReferenceMode(metaType, raw, kind) {
  if (metaType.startsWith("RefList:")) return "refList";
  if (metaType.startsWith("Ref:")) return "ref";
  if (metaType === "ChoiceList") return "choiceList";
  if (typeof raw === "number" && targetCatalogMap(kind).has(Number(raw))) return "ref";
  if (Array.isArray(raw) && listValues(raw).some((item) => typeof item === "number")) return "refList";
  return "text";
}

function createReferenceControl(kind, raw, metaType, controlId) {
  const mode = inferReferenceMode(metaType, raw, kind);
  const catalog = targetCatalog(kind);
  if ((mode === "ref" || mode === "refList") && catalog.length) {
    const select = document.createElement("select");
    select.id = controlId;
    select.dataset.mode = mode;
    if (mode === "refList") select.multiple = true;
    if (mode === "ref") {
      const empty = document.createElement("option");
      empty.value = "";
      empty.textContent = "";
      select.appendChild(empty);
    }
    catalog.forEach((item) => {
      const option = document.createElement("option");
      option.value = String(item.id);
      option.textContent = item.label;
      select.appendChild(option);
    });
    const selected = new Set(listValues(raw).map((value) => String(value)));
    [...select.options].forEach((option) => { option.selected = selected.has(option.value); });
    return select;
  }

  const input = document.createElement("input");
  input.id = controlId;
  input.type = "text";
  input.dataset.mode = metaType === "ChoiceList" ? "choiceList" : "text";
  input.value = kind === "service" ? serviceLabel(raw) : kind === "actor" ? actorLabel(raw) : asText(raw);
  const datalistId = `${controlId}_list`;
  input.setAttribute("list", datalistId);
  input._datalist = createDatalist(datalistId, catalog.map((item) => item.label));
  return input;
}

function createGenericReferenceControl(raw, metaType, controlId, meta) {
  const mode = metaType.startsWith("RefList:") ? "refList" : "ref";
  const select = document.createElement("select");
  select.id = controlId;
  select.dataset.mode = mode;
  if (mode === "refList") select.multiple = true;
  if (mode === "ref") {
    const empty = document.createElement("option");
    empty.value = "";
    empty.textContent = "";
    select.appendChild(empty);
  }
  referenceItemsForMeta(meta).forEach((item) => {
    const option = document.createElement("option");
    option.value = String(item.id);
    option.textContent = item.label;
    select.appendChild(option);
  });
  const selected = new Set(listValues(raw).map((value) => String(value)));
  [...select.options].forEach((option) => { option.selected = selected.has(option.value); });
  return select;
}

function createControl(subject, field, colId, raw, meta) {
  const controlId = `field_${subject.source}_${field.key}`;
  let control;
  const type = meta.type || "Any";

  if (field.kind === "service" || field.kind === "actor") {
    control = createReferenceControl(field.kind, raw, type, controlId);
  } else if (type.startsWith("Ref:") || type.startsWith("RefList:")) {
    control = createGenericReferenceControl(raw, type, controlId, meta);
  } else if (field.kind === "textarea") {
    control = document.createElement("textarea");
    control.id = controlId;
    control.value = asText(raw);
  } else if (field.kind === "date" && (type === "Date" || type === "DateTime" || dateToISO(raw))) {
    control = document.createElement("input");
    control.id = controlId;
    control.type = "date";
    control.value = dateToISO(raw);
    control.dataset.mode = "date";
  } else {
    control = document.createElement("input");
    control.id = controlId;
    control.type = "text";
    control.value = asText(raw);
    if (field.kind === "choice") {
      const listId = `${controlId}_list`;
      control.setAttribute("list", listId);
      control._datalist = createDatalist(listId, fieldOptions(subject, field.key));
    }
  }

  control.dataset.colId = colId;
  control.dataset.fieldKey = field.key;
  control.dataset.metaType = type;
  control.dataset.kind = field.kind || "text";
  control.dataset.original = JSON.stringify(comparableValue(raw, type, field.kind));
  if (field.readonly || meta.isFormula) control.disabled = true;
  return control;
}

function comparableValue(value, type, kind) {
  if (kind === "date" || type === "Date" || type === "DateTime") return dateToISO(value);
  if (type.startsWith("RefList:") || type === "ChoiceList") return listValues(value).map((item) => String(item));
  if (type.startsWith("Ref:")) return value ? Number(value) : 0;
  if (kind === "service") return serviceLabel(value);
  if (kind === "actor") return actorLabel(value);
  return asText(value);
}

function controlValue(control) {
  const type = control.dataset.metaType || "Any";
  const kind = control.dataset.kind || "text";
  const mode = control.dataset.mode || "";
  if (control.tagName === "SELECT" && control.multiple) {
    const values = [...control.selectedOptions].map((option) => Number(option.value));
    return type.startsWith("RefList:") ? ["L", ...values] : type === "ChoiceList" ? ["L", ...values.map(String)] : values;
  }
  if (control.tagName === "SELECT" && (mode === "ref" || type.startsWith("Ref:"))) return control.value ? Number(control.value) : 0;
  if (mode === "choiceList" || type === "ChoiceList") {
    return ["L", ...control.value.split(/[,;\n]+/).map((value) => value.trim()).filter(Boolean)];
  }
  if (control.type === "date" || kind === "date" || type === "Date" || type === "DateTime") return control.value || null;
  if ((kind === "service" || kind === "actor") && type.startsWith("Ref:")) {
    const catalog = targetCatalog(kind);
    const found = catalog.find((item) => normalizeKey(item.label) === normalizeKey(control.value));
    return found ? found.id : 0;
  }
  return control.value;
}

function openDrawer(subject) {
  activeSubject = subject;
  $("drawerSource").textContent = TABLE_DEFS[subject.source].sourceLabel;
  $("drawerTitle").textContent = subject.source === "rtu" && !subject.version ? "Détail du RTU" : subject.title;
  $("drawerSubtitle").textContent = [subject.service, subject.category].filter(Boolean).join(" · ");
  $("drawerMeta").textContent = `${TABLE_DEFS[subject.source].label} · ligne ${subject.rowId}`;

  const form = $("editForm");
  form.replaceChildren();
  const layout = EDIT_LAYOUTS[subject.source] || [];
  layout.forEach((group) => {
    const section = makeEl("section", "form-section");
    section.appendChild(makeEl("h3", "", group.title));
    const grid = makeEl("div", "form-grid");
    group.fields.forEach((field) => {
      const colId = subject.table.columns[field.key];
      if (!colId) return;
      const raw = subject.rawRow[colId];
      const meta = columnMeta(subject.table, colId);
      const wrapper = makeEl("div", `form-field ${field.full ? "form-field--full" : ""}`.trim());
      const label = document.createElement("label");
      label.textContent = field.label;
      wrapper.appendChild(label);
      const control = createControl(subject, field, colId, raw, meta);
      label.setAttribute("for", control.id);
      wrapper.appendChild(control);
      if (control._datalist) wrapper.appendChild(control._datalist);
      if (meta.isFormula) wrapper.appendChild(makeEl("small", "", "Colonne calculée dans Grist — consultation uniquement."));
      grid.appendChild(wrapper);
    });
    section.appendChild(grid);
    form.appendChild(section);
  });

  $("drawerBackdrop").classList.remove("hidden");
  $("drawer").classList.add("is-open");
  $("drawer").setAttribute("aria-hidden", "false");
}

function closeDrawer() {
  activeSubject = null;
  $("drawer").classList.remove("is-open");
  $("drawer").setAttribute("aria-hidden", "true");
  $("drawerBackdrop").classList.add("hidden");
}

function currentTimestampForColumn(table, colId) {
  const type = columnMeta(table, colId).type || "";
  return type === "DateTime" ? nowISO() : todayISO();
}

async function saveActiveSubject() {
  if (!activeSubject) return;
  const changed = {};
  $("editForm").querySelectorAll("[data-col-id]").forEach((control) => {
    if (control.disabled) return;
    const original = JSON.parse(control.dataset.original || "null");
    const value = controlValue(control);
    const comparable = comparableValue(value, control.dataset.metaType, control.dataset.kind);
    if (JSON.stringify(original) !== JSON.stringify(comparable)) changed[control.dataset.colId] = value;
  });

  const table = activeSubject.table;
  if (activeSubject.source === "emm" && table.columns.modifiedAt) {
    changed[table.columns.modifiedAt] = currentTimestampForColumn(table, table.columns.modifiedAt);
  }
  if (activeSubject.source === "conception") {
    if (table.columns.status && Object.prototype.hasOwnProperty.call(changed, table.columns.status) && table.columns.statusTimestamp) {
      changed[table.columns.statusTimestamp] = currentTimestampForColumn(table, table.columns.statusTimestamp);
    }
    if (table.columns.stage && Object.prototype.hasOwnProperty.call(changed, table.columns.stage) && table.columns.stageTimestamp) {
      changed[table.columns.stageTimestamp] = currentTimestampForColumn(table, table.columns.stageTimestamp);
    }
  }

  if (!Object.keys(changed).length) {
    showToast("Aucune modification à enregistrer");
    return;
  }

  try {
    if (!window.grist || !grist.docApi || typeof grist.docApi.applyUserActions !== "function") {
      throw new Error("Écriture Grist indisponible : accès complet requis.");
    }
    await withTimeout(grist.docApi.applyUserActions([
      ["UpdateRecord", activeSubject.tableId, activeSubject.rowId, changed]
    ], { parseStrings: true }), "Enregistrement Grist");
    showToast("Modifications enregistrées");
    closeDrawer();
    await loadAll();
  } catch (error) {
    console.error(error);
    showToast(error.message || "Erreur lors de l’enregistrement");
  }
}

function showToast(message) {
  const toast = $("toast");
  toast.textContent = message;
  toast.classList.remove("hidden");
  clearTimeout(showToast.timer);
  showToast.timer = setTimeout(() => toast.classList.add("hidden"), 3200);
}

function requiredTablesMissing() {
  return ["services", "rtu", "infra", "emm", "conception"]
    .filter((key) => runtimeTables[key]?.missing || !runtimeTables[key]?.tableId);
}

function renderSetupBanner() {
  const banner = $("setupBanner");
  const title = $("setupTitle");
  const text = $("setupText");
  const detail = $("setupDetail");
  if (!banner) return;

  const missing = requiredTablesMissing();
  const accessIsInsufficient = currentAccessLevel !== "unknown" && currentAccessLevel !== "full";
  if (!accessIsInsufficient && !missing.length && !lastGlobalError) {
    banner.classList.add("hidden");
    return;
  }

  banner.classList.remove("hidden");
  if (accessIsInsufficient) {
    title.textContent = "Accès complet au document requis";
    text.textContent = "Ce dashboard consolide plusieurs tables. Dans le panneau de création Grist, choisissez « Full document access / Accès complet au document », puis rechargez le widget.";
    detail.textContent = `Niveau d’accès actuel : ${currentAccessLevel || "non détecté"}`;
  } else if (lastGlobalError) {
    title.textContent = "Impossible de charger les données Grist";
    text.textContent = "Le widget est bien affiché, mais l’API Grist a retourné une erreur. Vérifiez l’accès complet, puis ouvrez la configuration des tables.";
    detail.textContent = lastGlobalError;
  } else {
    title.textContent = "Configuration des tables nécessaire";
    text.textContent = "Le mapping natif Grist n’apparaît pas pour ce widget multi-tables : c’est normal. Utilisez le bouton « Configurer les tables » ci-dessous pour associer chaque source à son identifiant technique.";
    detail.textContent = `Tables à configurer : ${missing.map((key) => TABLE_DEFS[key].label).join(", ")}`;
  }
}

function tableDiagnosticText() {
  return Object.entries(TABLE_DEFS).map(([key, def]) => {
    const table = runtimeTables[key];
    if (!table) return `${def.label} : non chargée`;
    if (table.error) return `${def.label} : ${table.error}`;
    if (!table.tableId) return `${def.label} : introuvable`;
    const matched = Object.entries(table.columns || {}).filter(([, colId]) => Boolean(colId)).length;
    const total = Object.keys(def.fields || {}).length;
    return `${def.label} : ${table.tableId} (${table.rows.length} ligne(s), ${matched}/${total} colonnes reconnues)`;
  }).join("\n");
}

async function loadAll() {
  const sequence = ++loadSequence;
  document.body.classList.add("loading");
  lastGlobalError = "";
  if ($("lastRefresh")) $("lastRefresh").textContent = "Lecture des tables…";
  try {
    if (currentAccessLevel !== "unknown" && currentAccessLevel !== "full") {
      runtimeTables = {};
      services = [];
      actors = [];
      renderDashboard();
      renderSetupBanner();
      return;
    }
    if (!allTableIds.length) {
      await refreshTableIds();
    }
    await loadMetadata();
    const keys = Object.keys(TABLE_DEFS);
    const loaded = await Promise.all(keys.map(loadOneTable));
    if (sequence !== loadSequence) return;
    runtimeTables = Object.fromEntries(loaded.map((table) => [table.key, table]));
    await loadReferenceCatalogs();
    loadCatalogs();
    // Les métadonnées améliorent l’édition (dates/références) mais ne doivent jamais bloquer l’affichage.
    loadMetadata().then(() => {
      Object.values(runtimeTables).forEach((table) => {
        if (table && table.tableId) table.meta = metadataByTable.get(table.tableId) || new Map();
      });
    }).catch((error) => console.warn("Métadonnées ignorées", error));
    if (selectedService && !serviceById.has(selectedService.id)) selectedService = null;
    $("lastRefresh").textContent = `Actualisé à ${new Date().toLocaleTimeString("fr-FR", { hour: "2-digit", minute: "2-digit" })}`;
    renderDashboard();
    renderSetupBanner();
    const missing = requiredTablesMissing();
    if (missing.length && !setupAutoOpened) {
      setupAutoOpened = true;
      setTimeout(openSettings, 150);
    }
  } catch (error) {
    console.error(error);
    lastGlobalError = error.message || String(error);
    renderSetupBanner();
    showToast(error.message || "Erreur de chargement du dashboard");
  } finally {
    document.body.classList.remove("loading");
  }
}

function openSettings() {
  populateSettings();
  const diag = $("settingsDiagnostic");
  if (diag) diag.textContent = `${tableDiagnosticText()}\n\nTables visibles via API : ${allTableIds.length ? allTableIds.join(", ") : "aucune / API non disponible"}`;
  $("settingsBackdrop").classList.remove("hidden");
  $("settingsModal").classList.remove("hidden");
  $("settingsModal").setAttribute("aria-hidden", "false");
}

function closeSettings() {
  $("settingsBackdrop").classList.add("hidden");
  $("settingsModal").classList.add("hidden");
  $("settingsModal").setAttribute("aria-hidden", "true");
}

function populateSettings() {
  const container = $("settingsFields");
  container.replaceChildren();
  Object.entries(TABLE_DEFS).forEach(([key, def]) => {
    const wrapper = makeEl("div", "settings-field");
    const label = document.createElement("label");
    label.textContent = def.label;
    const current = widgetOptions.tableIds?.[key] || runtimeTables[key]?.tableId || "";
    let control;
    if (allTableIds.length) {
      const select = document.createElement("select");
      select.id = `setting_${key}`;
      const blank = document.createElement("option");
      blank.value = "";
      blank.textContent = "Détection automatique";
      select.appendChild(blank);
      allTableIds.filter((id) => !id.startsWith("_grist_")).forEach((id) => {
        const option = document.createElement("option");
        option.value = id;
        option.textContent = id;
        select.appendChild(option);
      });
      if (current && ![...select.options].some((option) => option.value === current)) {
        const option = document.createElement("option");
        option.value = current;
        option.textContent = current;
        select.appendChild(option);
      }
      select.value = current;
      control = select;
    } else {
      const input = document.createElement("input");
      input.id = `setting_${key}`;
      input.type = "text";
      input.placeholder = "Identifiant technique de la table";
      input.value = current;
      control = input;
    }
    const diagnostic = makeEl("div", "settings-diagnostic");
    const table = runtimeTables[key];
    diagnostic.textContent = table?.error || (table?.tableId ? `${table.rows.length} ligne(s) détectée(s)` : "Non détectée");
    wrapper.appendChild(label);
    wrapper.appendChild(control);
    wrapper.appendChild(diagnostic);
    container.appendChild(wrapper);
  });
}

async function saveSettings() {
  const tableIds = {};
  Object.keys(TABLE_DEFS).forEach((key) => {
    const control = $(`setting_${key}`);
    const value = control ? control.value : "";
    if (value) tableIds[key] = value;
  });
  try {
    let persisted = false;
    if (window.grist && typeof grist.setOption === "function") {
      await grist.setOption("tableIds", tableIds);
      persisted = true;
    } else if (window.grist && typeof grist.setOptions === "function") {
      await grist.setOptions(Object.assign({}, widgetOptions || {}, { tableIds }));
      persisted = true;
    }
    // Local fallback keeps the widget usable on older deployments.  It is only
    // used when the Grist widget-options API is not exposed.
    try {
      localStorage.setItem("grist_service_dashboard_tableIds", JSON.stringify(tableIds));
    } catch (_) { /* Storage may be disabled by the browser. */ }
    widgetOptions = Object.assign({}, widgetOptions || {}, { tableIds });
    setupAutoOpened = false;
    showToast(persisted ? "Configuration enregistrée" : "Configuration appliquée dans ce navigateur");
    closeSettings();
    await loadAll();
  } catch (error) {
    console.error(error);
    showToast(error.message || "Erreur lors de l’enregistrement de la configuration");
  }
}

async function autoDetectSettings() {
  const detected = {};
  for (const [key, def] of Object.entries(TABLE_DEFS)) {
    const tableId = await findTableId(def, null);
    if (tableId) detected[key] = tableId;
  }
  Object.entries(detected).forEach(([key, tableId]) => {
    const select = $(`setting_${key}`);
    if (select) select.value = tableId;
  });
  showToast("Détection automatique terminée");
}

function bindEvents() {
  document.querySelectorAll("[data-collapse-source]").forEach((button) => {
    button.addEventListener("click", () => toggleSourcePanel(button.dataset.collapseSource));
  });
  Object.keys(sourceCollapseState).forEach(applySourceCollapseState);

  $("refreshBtn").addEventListener("click", loadAll);
  $("settingsBtn").addEventListener("click", openSettings);
  $("setupConfigBtn").addEventListener("click", openSettings);
  $("closeSettingsBtn").addEventListener("click", closeSettings);
  $("settingsBackdrop").addEventListener("click", closeSettings);
  $("saveSettingsBtn").addEventListener("click", saveSettings);
  $("autoDetectBtn").addEventListener("click", autoDetectSettings);
  $("closeDrawerBtn").addEventListener("click", closeDrawer);
  $("drawerBackdrop").addEventListener("click", closeDrawer);
  $("saveBtn").addEventListener("click", saveActiveSubject);

  $("serviceSearch").addEventListener("focus", openServiceDropdown);
  $("serviceSearch").addEventListener("input", (event) => {
    const hadSelection = Boolean(selectedService);
    if (selectedService && event.target.value !== selectedService.label) selectedService = null;
    if (hadSelection && !selectedService) renderDashboard();
    serviceComboIndex = -1;
    renderServiceDropdown(event.target.value);
    $("serviceDropdown").classList.remove("hidden");
    $("clearServiceBtn").classList.toggle("hidden", !event.target.value);
  });
  $("serviceSearch").addEventListener("keydown", (event) => {
    const items = [...$("serviceDropdown").querySelectorAll(".combo-item")];
    if (event.key === "ArrowDown" && items.length) {
      event.preventDefault();
      serviceComboIndex = Math.min(serviceComboIndex + 1, items.length - 1);
      renderServiceDropdown(event.target.value);
    } else if (event.key === "ArrowUp" && items.length) {
      event.preventDefault();
      serviceComboIndex = Math.max(serviceComboIndex - 1, 0);
      renderServiceDropdown(event.target.value);
    } else if (event.key === "Enter" && items.length) {
      event.preventDefault();
      items[Math.max(serviceComboIndex, 0)].click();
    } else if (event.key === "Escape") closeServiceDropdown();
  });
  $("clearServiceBtn").addEventListener("click", clearSelectedService);

  $("communityFilter").addEventListener("change", (event) => { filters.community = event.target.value; renderDashboard(); });
  $("departmentFilter").addEventListener("change", (event) => { filters.department = event.target.value; renderDashboard(); });
  $("deploymentStatusFilter").addEventListener("change", (event) => { filters.deploymentStatus = event.target.value; renderDashboard(); });
  $("deploymentPriorityFilter").addEventListener("change", (event) => { filters.deploymentPriority = event.target.value; renderDashboard(); });
  $("globalSearch").addEventListener("input", (event) => { filters.search = event.target.value; renderDashboard(); });
  $("statusFilter").addEventListener("change", (event) => { filters.status = event.target.value; renderDashboard(); });
  $("priorityFilter").addEventListener("change", (event) => { filters.priority = event.target.value; renderDashboard(); });
  $("hideCommonSubjectsBtn").addEventListener("click", () => {
    filters.hideCommonSubjects = !filters.hideCommonSubjects;
    renderDashboard();
  });
  $("resetFiltersBtn").addEventListener("click", resetAllFilters);
  $("hideClosedToggle")?.addEventListener("change", (event) => { filters.hideClosed = event.target.checked; renderDashboard(); });

  document.addEventListener("click", (event) => {
    if (!$("servicePicker").contains(event.target)) closeServiceDropdown();
  });
  document.addEventListener("keydown", (event) => {
    if (event.key === "Escape") {
      closeServiceDropdown();
      if ($("drawer").classList.contains("is-open")) closeDrawer();
      if (!$("settingsModal").classList.contains("hidden")) closeSettings();
    }
  });
}

async function loadInitialOptions() {
  try {
    if (!optionsReceived) {
      if (window.grist && typeof grist.getOptions === "function") {
        widgetOptions = (await grist.getOptions()) || {};
      } else if (window.grist && typeof grist.getOption === "function") {
        const tableIds = await grist.getOption("tableIds");
        if (tableIds) widgetOptions = { tableIds };
      }
    }
  } catch (error) {
    console.warn("Options Grist indisponibles, utilisation du mode de secours.", error);
  }
  if (!widgetOptions.tableIds) {
    try {
      const stored = JSON.parse(localStorage.getItem("grist_service_dashboard_tableIds") || "null");
      if (stored && typeof stored === "object") widgetOptions.tableIds = stored;
    } catch (_) { /* Ignore malformed or unavailable local storage. */ }
  }
}

initialLoadStarted = true;
loadInitialOptions()
  .catch(reportStartupError)
  .finally(() => setTimeout(loadAll, 0));

setInterval(() => {
  if (!$("drawer").classList.contains("is-open") && $("settingsModal").classList.contains("hidden")) loadAll();
}, 60000);

</script>
